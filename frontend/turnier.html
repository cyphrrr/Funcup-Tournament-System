<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Gruppenphase – BIW Pokal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root{
      --bg:#f3f4f6;--card:#fff;--text:#111827;--muted:#6b7280;--primary:#10b981;--border:#e5e7eb;--accent:#eef2ff;--success:#16a34a;--danger:#dc2626;
    }
    html.dark-mode{
      --bg:#111827;--card:#1f2937;--text:#f3f4f6;--muted:#9ca3af;--primary:#10b981;--border:#374151;--accent:#111827;--success:#10b981;--danger:#ef4444;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:var(--bg)}
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:url('img/logo-bg.png') repeat;z-index:-1}
    header{background:var(--card);border-bottom:1px solid var(--border);padding:1.5rem 2rem;z-index:50}
    @media(min-width:769px){header{position:sticky;top:0}}
    header h1{margin:0;font-size:1.5rem}
    header p{margin:.25rem 0 0;color:var(--muted)}

    /* Burger Menu */
    .burger-btn{background:none;border:none;cursor:pointer;padding:.5rem;display:flex;flex-direction:column;gap:4px;z-index:100}
    .burger-btn span{display:block;width:24px;height:3px;background:var(--text);border-radius:2px;transition:all .3s}
    .burger-btn.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
    .burger-btn.open span:nth-child(2){opacity:0}
    .burger-btn.open span:nth-child(3){transform:rotate(-45deg) translate(7px,-6px)}

    /* Menu Overlay */
    .menu-overlay{position:fixed;top:0;right:0;width:100%;height:100vh;background:rgba(0,0,0,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s}
    .menu-overlay.open{opacity:1;pointer-events:auto}

    /* Menu Panel */
    nav{position:fixed;top:0;right:-100%;width:280px;height:100vh;background:var(--card);z-index:100;transition:right .3s;padding:5rem 2rem 2rem;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
    nav.open{right:0}
    nav ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.5rem}
    nav a{text-decoration:none;color:var(--text);padding:.75rem 1rem;border-radius:8px;font-weight:500;display:block;transition:background .2s}
    nav a:hover{background:var(--accent)}
    nav a.active{background:var(--accent);color:var(--primary);font-weight:700}
    main{max-width:1200px;margin:0 auto;padding:2.5rem 2rem}
    h2{margin-bottom:1.5rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:2rem;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    .card-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.75rem}
    .card-title{font-weight:700;font-size:1.1rem}
    .card-sub{color:var(--muted);font-size:.9rem}
    table{width:100%;border-collapse:collapse;margin-top:.75rem;font-size:.9rem}
    th,td{padding:.55rem .65rem;border-bottom:1px solid var(--border);text-align:center}
    td:first-child,th:first-child{text-align:center;width:40px;font-weight:600}
    td:nth-child(2),th:nth-child(2){text-align:left}
    th{color:var(--muted);font-weight:600}
    tr.leader{font-weight:700;color:var(--primary)}
    .seasons-grid{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem}
    .season-item{padding:.5rem 1rem;cursor:pointer;border-radius:8px;transition:all .2s;background:var(--card);border:1px solid var(--border);font-size:.9rem;white-space:nowrap}
    .season-item:hover{background:var(--accent);border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
    .season-item.active{background:var(--accent);color:var(--primary);font-weight:600;border-color:var(--primary)}

    /* Matches */
    .matches-section{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
    .matchday-group{margin-bottom:1rem}
    .matchday-title{font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:.5rem;text-transform:uppercase}
    .match-header{display:grid;grid-template-columns:1fr auto 1fr auto;gap:.75rem;align-items:center;padding:.5rem .75rem;margin-bottom:.5rem;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase}
    .match-header-home{text-align:right}
    .match-header-score{text-align:center}
    .match-header-away{text-align:left}
    .match-item{display:grid;grid-template-columns:1fr auto 1fr auto;gap:.75rem;align-items:center;padding:.5rem .75rem;margin-bottom:.25rem;background:var(--accent);border-radius:6px;font-size:.9rem}
    .match-home{text-align:right}
    .match-score{min-width:50px;text-align:center;font-weight:700;font-size:1rem}
    .match-score.scheduled{color:var(--muted)}
    .match-score.played{color:var(--text)}
    .match-away{text-align:left}
    .match-info{text-align:right;font-size:.8rem;color:var(--muted);white-space:nowrap}

    /* Dark mode toggle */
    .dark-mode-toggle{appearance:none;cursor:pointer;width:50px;height:28px;background:var(--border);border:none;border-radius:14px;position:relative;transition:background .3s}
    .dark-mode-toggle::before{content:"☀️";position:absolute;left:4px;top:50%;transform:translateY(-50%);font-size:14px;transition:left .3s}
    .dark-mode-toggle::after{content:"🌙";position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0;transition:opacity .3s}
    .dark-mode-toggle:checked{background:var(--primary)}
    .dark-mode-toggle:checked::before{opacity:0}
    .dark-mode-toggle:checked::after{opacity:1}

    /* Footer */
    footer{background:var(--card);border-top:1px solid var(--border);padding:1.5rem 2rem;margin-top:3rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:2rem;align-items:center;font-size:.85rem;color:var(--muted)}
    .footer-left{text-align:left}
    .footer-center{text-align:center}
    .footer-right{text-align:right}
    footer a{color:var(--primary);text-decoration:none}
    footer a:hover{text-decoration:underline}
    .backend-status{display:inline-flex;align-items:center;gap:.5rem;font-weight:500}
    .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .status-dot.online{background:#10b981}
    .status-dot.offline{background:#dc2626}
    @media(max-width:768px){footer{grid-template-columns:1fr;gap:1rem;text-align:center}.footer-left,.footer-right{text-align:center}}
  </style>
</head>
<body>
  <header>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:1rem">
        <a href="index.html" style="text-decoration:none"><img src="img/logo_comic.png" alt="BIW Pokal Logo" style="height:60px;width:auto"></a>
        <div>
          <h1 style="font-size:1.1rem"><a href="index.html" style="color:var(--text);text-decoration:none">Die Besten im Westen</a> <span style="color:var(--muted);font-weight:400">– Gruppenphase</span></h1>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:1rem">
        <input type="checkbox" class="dark-mode-toggle" id="dark-mode-toggle" aria-label="Dark Mode">
        <button class="burger-btn" id="burger-btn" aria-label="Menü öffnen">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Menu Overlay -->
  <div class="menu-overlay" id="menu-overlay"></div>

  <!-- Navigation Menu -->
  <nav id="nav-menu">
    <ul>
      <li><a href="index.html">Start</a></li>
      <li><a href="turnier.html" class="active">Gruppenphase</a></li>
      <li><a href="ko.html">KO‑Phase</a></li>
      <li><a href="ewige-tabelle.html">Ewige Tabelle</a></li>
      <li><a href="regeln.html">Regeln</a></li>
      <li><a href="archiv.html">Archiv</a></li>
      <li id="admin-link" style="display:none"><a href="admin.html" style="color:var(--primary);font-weight:600">🔐 Admin</a></li>
    </ul>
  </nav>

  <main>
    <section>
      <div class="card">
        <h2 style="margin-top:0">Gruppenphase</h2>
        <h3>Saisons</h3>
        <div id="seasons" class="seasons-grid"></div>
      </div>

      <div class="card">
        <h3>Gruppen & Tabellen (<span id="active-season">–</span>)</h3>
        <div id="groups"><em>Wähle eine Saison</em></div>
      </div>
    </section>
  </main>

<script type="module">
import { API_URL } from './js/config.js';
const API = API_URL;
const seasonsContainer = document.getElementById('seasons');
const groupsDiv = document.getElementById('groups');
const activeSeasonSpan = document.getElementById('active-season');
let openedSeasonId = null;
let teamCache = {};

// Team-Namen laden
async function loadTeams(seasonId) {
  const groups = await fetch(`${API}/api/seasons/${seasonId}/groups-with-teams`).then(r => r.json());
  groups.forEach(g => g.teams.forEach(t => teamCache[t.id] = t.name));
}

function teamName(id) {
  return teamCache[id] || `Team ${id}`;
}

async function loadSeason(season) {
  if (openedSeasonId === season.id) {
    openedSeasonId = null;
    groupsDiv.innerHTML = '<em>Wähle eine Saison</em>';
    activeSeasonSpan.textContent = '–';
    seasonsContainer.querySelectorAll('.season-item').forEach(li => li.classList.remove('active'));
    return;
  }

  openedSeasonId = season.id;
  activeSeasonSpan.textContent = season.name;
  groupsDiv.innerHTML = '<em>Lade...</em>';

  // Active state
  seasonsContainer.querySelectorAll('.season-item').forEach(li => li.classList.remove('active'));
  event.target.classList.add('active');

  // Teams cachen
  await loadTeams(season.id);

  // Gruppen laden
  const groups = await fetch(`${API}/api/seasons/${season.id}/groups-with-teams`).then(r => r.json());
  groupsDiv.innerHTML = '';

  for (const g of groups) {
    const card = document.createElement('div');
    card.className = 'card';
    const teamNames = g.teams.map(t => t.name).join(', ') || '–';
    card.innerHTML = `<div class="card-header"><div class="card-title">Gruppe ${g.group.name}</div><div class="card-sub">${teamNames}</div></div>`;

    const table = await fetch(`${API}/api/groups/${g.group.id}/standings`).then(r => r.json());
    if (table.length) {
      const maxPts = Math.max(...table.map(r => r.points));
      const tbl = document.createElement('table');
      const header = tbl.insertRow();
      ['Pl.', 'Team', 'Sp', 'S', 'U', 'N', 'T+', 'T-', 'Pkt'].forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        header.appendChild(th);
      });
      table.forEach((row, idx) => {
        const tr = tbl.insertRow();
        if (row.points === maxPts) tr.className = 'leader';

        tr.insertCell().textContent = idx + 1;

        const teamCell = tr.insertCell();
        const teamLink = document.createElement('a');
        teamLink.href = `team.html?id=${row.team_id}`;
        teamLink.textContent = teamName(row.team_id);
        teamLink.style.color = 'inherit';
        teamLink.style.textDecoration = 'none';
        teamLink.style.fontWeight = row.points === maxPts ? '700' : '500';
        teamCell.appendChild(teamLink);

        tr.insertCell().textContent = row.played;
        tr.insertCell().textContent = row.won;
        tr.insertCell().textContent = row.draw;
        tr.insertCell().textContent = row.lost;
        tr.insertCell().textContent = row.goals_for;
        tr.insertCell().textContent = row.goals_against;
        tr.insertCell().textContent = row.points;
      });
      card.appendChild(tbl);
    }

    // Matches anzeigen
    if (g.matches && g.matches.length > 0) {
      const matchesSection = document.createElement('div');
      matchesSection.className = 'matches-section';

      // Nach Spieltag gruppieren
      const matchesByDay = {};
      g.matches.forEach(m => {
        const day = m.matchday || 0;
        if (!matchesByDay[day]) matchesByDay[day] = [];
        matchesByDay[day].push(m);
      });

      // Header für Matches hinzufügen (einmalig am Anfang)
      const headerDiv = document.createElement('div');
      headerDiv.className = 'match-header';
      const h1 = document.createElement('div');
      h1.className = 'match-header-home';
      h1.textContent = 'Heim';
      const h2 = document.createElement('div');
      h2.className = 'match-header-score';
      h2.textContent = 'Ergebnis';
      const h3 = document.createElement('div');
      h3.className = 'match-header-away';
      h3.textContent = 'Gast';
      const h4 = document.createElement('div');
      h4.textContent = 'Spieltag';
      headerDiv.appendChild(h1);
      headerDiv.appendChild(h2);
      headerDiv.appendChild(h3);
      headerDiv.appendChild(h4);
      matchesSection.appendChild(headerDiv);

      // Spieltage sortiert darstellen
      Object.keys(matchesByDay).sort((a, b) => a - b).forEach(day => {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'matchday-group';

        matchesByDay[day].forEach(m => {
          const matchDiv = document.createElement('div');
          matchDiv.className = 'match-item';

          // Team A (rechtsbündig)
          const homeDiv = document.createElement('div');
          homeDiv.className = 'match-home';
          homeDiv.textContent = teamName(m.home_team_id);

          // Ergebnis (zentriert)
          const scoreDiv = document.createElement('div');
          scoreDiv.className = `match-score ${m.status}`;
          if (m.status === 'played' && m.home_goals !== null && m.away_goals !== null) {
            scoreDiv.textContent = `${m.home_goals}:${m.away_goals}`;
          } else {
            scoreDiv.textContent = '-:-';
          }

          // Team B (linksbündig)
          const awayDiv = document.createElement('div');
          awayDiv.className = 'match-away';
          awayDiv.textContent = teamName(m.away_team_id);

          // Spieltag-Info (rechtsbündig)
          const infoDiv = document.createElement('div');
          infoDiv.className = 'match-info';
          if (m.matchday) {
            if (m.ingame_week) {
              infoDiv.textContent = `${m.matchday} (W${m.ingame_week})`;
            } else {
              infoDiv.textContent = `Spieltag ${m.matchday}`;
            }
          }

          matchDiv.appendChild(homeDiv);
          matchDiv.appendChild(scoreDiv);
          matchDiv.appendChild(awayDiv);
          matchDiv.appendChild(infoDiv);
          dayDiv.appendChild(matchDiv);
        });

        matchesSection.appendChild(dayDiv);
      });

      card.appendChild(matchesSection);
    }

    groupsDiv.appendChild(card);
  }
}

// Saisons laden
fetch(`${API}/api/seasons`).then(r => r.json()).then(seasons => {
  seasonsContainer.innerHTML = '';

  // Sortiere nach ID absteigend (neueste zuerst)
  seasons.sort((a, b) => b.id - a.id);

  seasons.forEach(s => {
    const div = document.createElement('div');
    div.textContent = s.name;
    div.className = 'season-item';
    div.onclick = () => loadSeason(s);
    seasonsContainer.appendChild(div);
  });
});

// Check if user is logged in (show admin link)
if (localStorage.getItem('biw_token')) {
  document.getElementById('admin-link').style.display = 'block';
}

// Burger Menu Toggle
const burgerBtn = document.getElementById('burger-btn');
const navMenu = document.getElementById('nav-menu');
const menuOverlay = document.getElementById('menu-overlay');

function toggleMenu() {
  burgerBtn.classList.toggle('open');
  navMenu.classList.toggle('open');
  menuOverlay.classList.toggle('open');
}

burgerBtn.addEventListener('click', toggleMenu);
menuOverlay.addEventListener('click', toggleMenu);

// Close menu on navigation
navMenu.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', () => {
    if (navMenu.classList.contains('open')) {
      toggleMenu();
    }
  });
});

// Dark Mode Toggle
function initDarkMode() {
  const isDarkMode = localStorage.getItem('biw_dark_mode') === 'true';
  const toggle = document.getElementById('dark-mode-toggle');

  if (isDarkMode) {
    document.documentElement.classList.add('dark-mode');
    toggle.checked = true;
  }

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.classList.add('dark-mode');
      localStorage.setItem('biw_dark_mode', 'true');
    } else {
      document.documentElement.classList.remove('dark-mode');
      localStorage.setItem('biw_dark_mode', 'false');
    }
  });
}

initDarkMode();
</script>

<footer>
  <div class="footer-left">
    <div class="backend-status">
      <span class="status-dot online" id="backend-status-dot"></span>
      <span id="backend-status-text">Backend verbunden</span>
    </div>
  </div>
  <div class="footer-center">
    <p style="margin:0">© 2026 BIW Pokal | <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a></p>
  </div>
  <div class="footer-right">
    <p style="margin:0">Version 1.0</p>
  </div>
</footer>
<script type="module">
import { API_URL } from './js/config.js';

function updateBackendStatus() {
  const statusDot = document.getElementById("backend-status-dot");
  const statusText = document.getElementById("backend-status-text");
  if (!statusDot || !statusText) return;
  fetch(`${API_URL}/api/seasons`).then(r => {
    statusDot.className = r.ok ? "status-dot online" : "status-dot offline";
    statusText.textContent = r.ok ? "Backend verbunden" : "Backend getrennt";
  }).catch(() => {
    statusDot.className = "status-dot offline";
    statusText.textContent = "Backend getrennt";
  });
}
updateBackendStatus();
setInterval(updateBackendStatus, 30000);
</script>

</body>
</html>
