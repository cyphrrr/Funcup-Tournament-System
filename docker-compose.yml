version: '3.8'

services:
  # Backend (FastAPI)
  backend:
    build: ./backend
    container_name: biw-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://biw_user:biw_password@postgres:5432/biw_pokal
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-biw2026!}
      - API_KEY=${API_KEY:-biw-n8n-secret-key-change-me}
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - biw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Postgres Database
  postgres:
    image: postgres:15-alpine
    container_name: biw-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=biw_user
      - POSTGRES_PASSWORD=biw_password
      - POSTGRES_DB=biw_pokal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - biw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biw_user -d biw_pokal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: biw-frontend
    restart: unless-stopped
    ports:
      - "5000:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - biw-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  biw-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
