events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # ============================================
        # Admin-Interface mit Basic Auth schützen
        # ============================================
        location = /admin.html {
            auth_basic "BIW Pokal Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            try_files $uri =404;
        }

        # Optional: Auch admin-spezifische Assets schützen
        location ~ ^/admin/ {
            auth_basic "BIW Pokal Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            try_files $uri =404;
        }

        # Frontend Static Files
        location / {
            try_files $uri $uri/ =404;
        }

        # Backend API Proxy
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS Headers (optional, Backend setzt sie schon)
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Backend Health Check
        location /health {
            proxy_pass http://backend:8000/health;
            proxy_set_header Host $host;
        }
    }

    # SSL Configuration (aktivieren wenn Zertifikat vorhanden)
    # server {
    #     listen 443 ssl http2;
    #     server_name deine-domain.de;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # ... rest of config same as above
    # }
}
